name: 朝のニュース自動更新

on:
  schedule:
    # 7:00 AM JST = 22:00 UTC (previous day)
    - cron: "0 22 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  write-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout graph
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run morning news script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LOGSEQ_GRAPH_DIR: ${{ github.workspace }}
        run: python scripts/morning_news.py

      - name: Commit and push journal entry
        run: |
          git config user.name "morning-news-bot"
          git config user.email "kevinb062004@gmail.com"
          git add journals/
          git diff --cached --quiet || git commit -m "📰 朝のニュース $(date +'%Y-%m-%d')"
          git push
